<!DOCTYPE html>
<html><head><title>Kadir Basan — Quotes</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f0f1a;font-family:-apple-system,'Helvetica Neue',sans-serif}
.swiper{width:100%;height:100%;overflow:hidden;position:relative}
.track{display:flex;height:100%;transition:transform .35s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:60px 32px}
.quote{color:#f0f0f5;font-size:22px;line-height:1.6;font-weight:400;text-align:center;max-width:600px;overflow:auto;max-height:100%}
.dots{position:fixed;bottom:60px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:10}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s}
.dot.active{background:#f0f0f5;width:24px;border-radius:4px}
.count{position:fixed;top:50px;right:24px;color:rgba(255,255,255,.25);font-size:14px;font-weight:500;z-index:10}
.btn{position:fixed;bottom:30px;right:30px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#f0f0f5;font-size:20px;z-index:10;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
@keyframes scroll{0%{transform:translateY(0)}100%{transform:translateY(-100%)}}
.teleprompter{position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;background:#0f0f1a;display:none;overflow:hidden;padding:40px 20%}
.teleprompter.active{display:flex;align-items:center}
.t-text{color:#f0f0f5;font-size:26px;line-height:1.7;font-weight:400;text-align:center;animation:scroll 30s linear infinite}
.back{position:fixed;top:20px;left:20px;z-index:30;background:rgba(255,255,255,.1);border:none;color:#f0f0f5;padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer}
</style></head>
<body>
<div class="swiper" id="swiper">
  <div class="track" id="track"></div>
  <div class="dots" id="dots"></div>
  <div class="count" id="count"></div>
</div>
<button class="btn" id="tp" onclick="toggleTP()">\u25B6</button>
<div class="teleprompter" id="tp-view">
  <button class="back" onclick="toggleTP()">✕ Done</button>
  <div class="t-text" id="tp-text"></div>
</div>
<script>
const q=[{"text": "Favorieten İnsan bazen bir yabancı gibi uzaktan bakıyor yaşamadaki yaşamak istediklerini hayallerini boşa giden bir ömre", "likes": 2}];
const track=document.getElementById('track');
const dots=document.getElementById('dots');
const count=document.getElementById('count');
let i=0;
q.forEach((q,j)=>{
  let s=document.createElement('div');s.className='slide';
  let p=document.createElement('div');p.className='quote';p.textContent=q.text;
  s.appendChild(p);track.appendChild(s);
  let d=document.createElement('div');d.className='dot';dots.appendChild(d);
});
function go(n){
  i=Math.max(0,Math.min(n,q.length-1));
  track.style.transform='translateX(-'+(i*100)+'%)';
  dots.querySelectorAll('.dot').forEach((d,j)=>d.className='dot'+(j===i?' active':''));
  count.textContent=(i+1)+'/'+q.length;
}
go(0);
let sx=0,ex=0,swiping=false;
document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;swiping=true});
document.addEventListener('touchmove',e=>{if(!swiping)return;ex=e.touches[0].clientX});
document.addEventListener('touchend',()=>{if(!swiping)return;swiping=false;let d=sx-ex;if(Math.abs(d)>50)go(d>0?i+1:i-1)});
function toggleTP(){
    let v=document.getElementById('tp-view');
    let s=document.getElementById('swiper');
    let t=document.getElementById('tp-text');
    let b=document.getElementById('tp');
    if(v.classList.contains('active')){
        v.classList.remove('active');s.style.display='';b.textContent='\u25B6'
    }else{
        t.textContent=q[i].text;v.classList.add('active');s.style.display='none';b.textContent='\u23F9'
    }
}
</script>
</body></html>
